<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e293b, #0f172a, #334155);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      animation: bgShift 8s ease infinite alternate;
    }

    @keyframes bgShift {
      0% { background: linear-gradient(135deg, #1e293b, #0f172a, #334155); }
      100% { background: linear-gradient(135deg, #0f172a, #1e293b, #475569); }
    }

    .container {
      text-align: center;
      padding: 40px;
      color: #fff;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-size: 180px;
      font-weight: 700;
      color: #D4A017;
      line-height: 1;
      font-family: 'Playfair Display', serif;
      animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #d4a017, 0 0 20px #d4a017; }
      to { text-shadow: 0 0 25px #facc15, 0 0 40px #facc15; }
    }

    .title {
      font-size: 42px;
      margin-top: 10px;
      margin-bottom: 15px;
      color: #f1f5f9;
    }

    .description {
      max-width: 600px;
      margin: auto;
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 35px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 35px;
      background: #D4A017;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: 0.4s;
    }

    .home-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 25px rgba(212,160,23,.4);
    }

    @media(max-width:768px) {
      .error-code { font-size: 120px; }
      .title { font-size: 32px; }
      .description { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="title">Oops! Page Not Found</h1>
    <p class="description">
      The page you are looking for might have been removed, renamed, or is temporarily unavailable.
    </p>
    <a href="../index.html" class="home-btn">
      ⬅ Back To Home
    </a>
  </div>
</body>
</html>
